<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Shop Final</title>

<!-- Adobe Launch -->
<script src="https://assets.adobedtm.com/e72b4113c11a/c99811a14ae0/launch-d8585b5fbe7b.min.js" async></script>

<script>
window.dataLayer = window.dataLayer || [];

// Page Load
window.dataLayer.push({
  event: "pageLoad",
  page: {
    pageName: document.title,
    pageType: "homepage"
  },
  user: {
    loginStatus: "guest"
  }
});

// Popup Function
function showPopup(message) {
  let popup = document.createElement("div");
  popup.innerText = message;

  popup.style.position = "fixed";
  popup.style.bottom = "20px";
  popup.style.right = "20px";
  popup.style.background = "#2ecc71";
  popup.style.color = "#fff";
  popup.style.padding = "10px";
  popup.style.borderRadius = "5px";
  popup.style.zIndex = "9999";

  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 2000);
}
</script>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }
.header { background:#ff6f61; color:white; padding:15px; display:flex; justify-content:space-between; }
.banner { background:white; margin:20px; padding:25px; border-radius:10px; }
.products { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:20px; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; text-align:center; }
button { margin:5px; padding:8px; border:none; border-radius:5px; cursor:pointer; }
.view { background:#3498db; color:white; }
.cart { background:#2ecc71; color:white; }
.actions { text-align:center; padding:20px; }
.actions button { background:#333; color:white; }
</style>
</head>

<body>

<div class="header">
  <h2>🛒 E-Shop</h2>
  <div>
    <input id="searchBox" placeholder="Search...">
    <button id="searchBtn">Search</button>
  </div>
</div>

<div class="banner">
  <h2>Top Electronics Deals</h2>
  <button id="promoBtn">Shop Now</button>
</div>

<div class="products">

  <div class="card" data-category="Electronics">
    <h3>iPhone 15</h3>
    <p>₹80,000</p>
    <button class="view">View</button>
    <button class="cart">Add</button>
  </div>

  <div class="card" data-category="Electronics">
    <h3>Laptop</h3>
    <p>₹60,000</p>
    <button class="view">View</button>
    <button class="cart">Add</button>
  </div>

</div>

<div class="actions">
  <button id="loginBtn">Login</button>
  <button id="checkoutBtn">Checkout</button>
  <button id="purchaseBtn">Buy Now</button>
</div>

<script>

// Helper
function getProductData(element) {
  let card = element.closest(".card");
  return {
    name: card.querySelector("h3").innerText,
    category: card.dataset.category,
    price: card.querySelector("p").innerText.replace(/[^\d]/g, '')
  };
}

// View
document.querySelectorAll(".view").forEach(btn => {
  btn.addEventListener("click", function() {
    let product = getProductData(this);

    dataLayer.push({
      event: "productView",
      product: product
    });

    showPopup("Viewed");
  });
});

// Add to Cart
document.querySelectorAll(".cart").forEach(btn => {
  btn.addEventListener("click", function() {
    let product = getProductData(this);

    dataLayer.push({
      event: "addToCart",
      product: product
    });

    showPopup("Added to cart");
  });
});

// Search
document.getElementById("searchBtn").onclick = function() {
  let keyword = document.getElementById("searchBox").value;

  dataLayer.push({
    event: "search",
    search: { keyword: keyword }
  });

  showPopup("Search done");
};

// Login
document.getElementById("loginBtn").onclick = function() {
  dataLayer.push({
    event: "login"
  });

  showPopup("Logged in");
};

// Checkout
document.getElementById("checkoutBtn").onclick = function() {
  dataLayer.push({
    event: "checkout"
  });

  showPopup("Checkout");
};

// Purchase
document.getElementById("purchaseBtn").onclick = function() {
  dataLayer.push({
    event: "purchase"
  });

  showPopup("Purchased");
};

// Promo
document.getElementById("promoBtn").onclick = function() {
  dataLayer.push({
    event: "promoClick"
  });

  showPopup("Promo clicked");
};

</script>

</body>
</html>
